---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mc-frontend
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mc-frontend
  namespace: default
rules:
  - apiGroups: ["mc.erikjearl.io"]
    resources: ["minecraftservers"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mc-frontend
  namespace: default
subjects:
  - kind: ServiceAccount
    name: mc-frontend
    namespace: default
roleRef:
  kind: Role
  name: mc-frontend
  apiGroup: rbac.authorization.k8s.io