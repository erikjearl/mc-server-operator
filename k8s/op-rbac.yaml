---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mc-operator
rules:
  # MinecraftServer CRD — watch and update status
  - apiGroups: ["mc.erikjearl.io"]
    resources: ["minecraftservers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["mc.erikjearl.io"]
    resources: ["minecraftservers/status"]
    verbs: ["get", "patch", "update"]

  # Managed resources — PVC, Service
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "services"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

  # Managed resources — Deployment
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

  # Node address lookup
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

  # Kopf internals — CRD discovery (Kopf watches CRDs to know which CRs to handle)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # Kopf internals — progress tracking and event posting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mc-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mc-operator
subjects:
  - kind: ServiceAccount
    name: mc-operator
    namespace: mc-operator