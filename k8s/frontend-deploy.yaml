---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-frontend
  namespace: default
  labels:
    app: mc-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-frontend
  template:
    metadata:
      labels:
        app: mc-frontend
    spec:
      serviceAccountName: mc-frontend
      containers:
        - name: frontend
          image: mc-frontend:latest   # build & push your own image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MC_NAMESPACE
              value: "default"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mc-frontend
  namespace: default
spec:
  selector:
    app: mc-frontend
  type: NodePort
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP