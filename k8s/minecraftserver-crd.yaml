apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: minecraftservers.mc.erikjearl.io
spec:
  group: mc.erikjearl.io
  names:
    kind: MinecraftServer
    listKind: MinecraftServerList
    plural: minecraftservers
    singular: minecraftserver
    shortNames:
      - mcs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - gameVersion
              properties:
                gameVersion:
                  type: string
                  description: Minecraft version (e.g. 1.16.1)
                serverProperties:
                  type: object
                  description: Additional server.properties settings
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                port:
                  type: integer
                address:
                  type: string                  
                deploymentRef:
                  type: string
                serviceRef:
                  type: string
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.gameVersion
        - name: Address
          type: string
          jsonPath: .status.address
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp