# Example MinecraftServer resource — basic speedrun server
apiVersion: mc.erikjearl.io/v1alpha1
kind: MinecraftServer
metadata:
  name: speedrun-1-16
  namespace: default
spec:
  gameVersion: "1.16.1"
  serverProperties:
    GAMEMODE: survival
    DIFFICULTY: normal
    MAX_PLAYERS: "2"
    SEED: "-1234567890"
    MOTD: "Speedrun practice server"
    ONLINE_MODE: "true"
    WHITE_LIST: "true"