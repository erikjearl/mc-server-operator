---
# PersistentVolumeClaim for Minecraft world data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mc-data
  namespace: mc
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# Deployment for itzg/docker-minecraft-server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server
  namespace: mc
  labels:
    app: minecraft-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-server
  strategy:
    type: Recreate  # Required: avoid two pods writing to the same volume
  template:
    metadata:
      labels:
        app: minecraft-server
    spec:
      containers:
        - name: minecraft
          image: itzg/minecraft-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 25565
              name: minecraft
              protocol: TCP
          env:
            # Required — must accept the Minecraft EULA
            - name: EULA
              value: "TRUE"
            # Server type: VANILLA, PAPER, FABRIC, FORGE, etc.
            - name: TYPE
              value: "VANILLA"
            # Minecraft version — pin to e.g. "1.21.1" for a specific release
            - name: VERSION
              value: "1.16.1"
            # JVM heap size — keep below the container memory limit
            - name: MEMORY
              value: "2G"
            # Basic server settings
            - name: DIFFICULTY
              value: "normal"
            - name: MAX_PLAYERS
              value: "10"
            - name: MOTD
              value: "Test MC Server on K8s"
            - name: ONLINE_MODE
              value: "TRUE"
          volumeMounts:
            - name: mc-data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          readinessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: mc-data
          persistentVolumeClaim:
            claimName: mc-data

---
# Service — ClusterIP for in-cluster access
# Change type to NodePort or LoadBalancer to expose externally
apiVersion: v1
kind: Service
metadata:
  name: minecraft-server
  namespace: mc
  labels:
    app: minecraft-server
spec:
  selector:
    app: minecraft-server
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      nodePort: 30565   # connect via <node-IP>:30565 (e.g. 192.168.86.11:30565)
      protocol: TCP
  # type: LoadBalancer  # use with MetalLB or a cloud provider
  type: NodePort
