# Example MinecraftServer resource — basic speedrun server
apiVersion: mc.homelab.io/v1
kind: MinecraftServer
metadata:
  name: speedrun-1-16
  namespace: default
spec:
  seed: "-1234567890"
  gameVersion: "1.16.1"
  gameMode: survival
  difficulty: normal
  maxPlayers: 2
  allowCheats: false
  whitelistedUsers:
    - "runner1"
  metadataPreset: "java-1.16-any%"
  ttlSeconds: 7200